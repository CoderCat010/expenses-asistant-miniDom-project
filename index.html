<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programmer Expenses</title>

    <!-- css link -->
    <link rel="stylesheet" href="./style.css">
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- google font -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- =================main parent section================= -->
     <header class="flex items-center justify-center min-h-screen">
        <!-- main dashboard -->
         <div class="container max-w-md bg-white rounded-2xl shadow-xl p-10">
            <!------------- 
            Dashboard Title 
            -------------->
            <div class="text-center text-xl font-bold mb-6 text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-purple-600">
                <h1>💻 Programmer Expenses Assistant</h1>
            </div>

            <!-----------------------------
            Tabs for Assistant and History
            ------------------------------>
            <div class="flex justify-between mb-6">
                <button id="assistant-tab" class="w-1/2 py-2 rounded-l-md focus:outline-none transition-colors duration-200 text-white font-semibold bg-gradient-to-r from-blue-500 to-purple-600"> Assistant</button>

                <button id="history-tab" class="w-1/2 py-2 rounded-r-md focus:outline-none transition-colors duration-200 text-gray-600 font-semibold">History</button>
            </div>

            <!--------------- 
            Expense Form Part
            ---------------->
            <div id="expense-form" class="grid grid-cols-2 gap-4">
            <!-- Income -->
                <div class="relative col-span-2">
                    <!-- title -->
                    <h2 class="block font-semibold mb-2 text-gray-700">Income 💰</h2>
                    <!-- input box -->
                    <input id="income" type="number" class="w-full border border-gray-300 px-3 py-2 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200" placeholder="Enter Income"/>

                    <!-- error msg -->
                    <p id="income-error" class="text-red-500 text-xs mt-1 hidden">⚠️ Invalid Income!</p>
                </div>

            <!-- Software Subscriptions Cost -->
                <div class="relative mt-2">
                    <!-- title -->
                    <h2 class="block font-semibold mb-2 text-gray-700">Software 💻</h2>
                    <!-- input box -->
                    <input type="number" id="software" class="w-full border border-gray-300 px-3 py-2 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200" placeholder="Software Cost"/>

                    <!-- error msg -->
                    <p id="software-error" class="text-red-500 text-xs mt-1 hidden">⚠️ Invalid Amount!</p>
                </div>

            <!-- Courses/Books Cost -->
                <div class="relative mt-2">
                    <!-- title -->
                    <h2 class="block font-semibold mb-2 text-gray-700">Courses 📚</h2>
                    <!-- input box -->
                    <input type="number" id="courses" class="w-full border border-gray-300 px-3 py-2 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200" placeholder="Course Cost"/>

                    <!-- error msg -->
                    <p id="courses-error" class="text-red-500 text-xs mt-1 hidden">⚠️ Invalid Amount!</p>
                </div>

            <!-- Internet Cost -->
                <div class="relative mt-2">
                    <!-- title -->
                    <h2 class="block font-semibold mb-2 text-gray-700">Internet 🌐</h2>
                    <!-- input box -->
                    <input type="number" id="internet" class="w-full border border-gray-300 px-3 py-2 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200" placeholder="Internet Cost"/>

                    <!-- error msg -->
                    <p id="internet-error" class="text-red-500 text-xs mt-1 hidden">⚠️ Invalid amount!</p>
                </div>

            
            
           
            </div>













































         </div>
     </header>












    <!-- js file -->
    <script src="./script.js"></script>
</body>
</html>
